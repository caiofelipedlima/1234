        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 5px; color: #2e7d32; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #c8e6c9; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-group { display: flex; gap: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2e7d32; color: white; }
        #loading { display: none; color: #2e7d32; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .row { display: flex; gap: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 150px; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header"><h2>MILIGRAMA - Registro de Perda</h2></div>
    
    <form id="perdaForm">
        <div class="row">
            <div class="col" style="flex: 0.5;">
                <label>SKU / CÓDIGO *</label>
                <input type="text" id="sku" placeholder="Digite o SKU..." required>
            </div>
            <div class="col" style="flex: 1.5;">
                <label>NOME DO PRODUTO (AUTO) *</label>
                <input type="text" id="produtoNome" placeholder="O nome aparecerá automaticamente" required>
            </div>
        </div>

        <label>MOTIVO DA PERDA *</label>
        <select id="motivo" required>
            <option value="">Selecione o motivo...</option>
            <option value="Roubo / Furto">1 - Roubo / Furto</option>
            <option value="Avaria">2 - Avaria</option>
            <option value="Vencimento">3 - Vencimento</option>
            <option value="Perda no Processo">5 - Perda no Processo</option>
            <option value="Coleta Qualidade">6 - Coleta Qualidade</option>
        </select>

        <div class="row">
            <div class="col">
                <label>QUANTIDADE *</label>
                <input type="number" id="qtd" step="0.001" placeholder="0,000" required>
            </div>
            <div class="col">
                <label>CONFIRMAR QUANTIDADE *</label>
                <input type="number" id="qtdConfirma" step="0.001" placeholder="0,000" required>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>UNIDADE *</label>
                <select id="unidade" required>
                    <option value="G">G</option>
                    <option value="KG">KG</option>
                    <option value="L">L</option>
                    <option value="ML">ML</option>
                    <option value="UN">UN</option>
                </select>
            </div>
            <div class="col">
                <label>LOTE *</label>
                <input type="text" id="lote" placeholder="Lote do item" required>
            </div>
        </div>

        <label>OBSERVAÇÕES (OPCIONAL)</label>
        <textarea id="obs" rows="2" placeholder="Detalhes adicionais..."></textarea>

        <div id="loading">Enviando para a planilha... aguarde.</div>
        
        <div class="btn-group">
            <button type="button" id="btnSalvar" onclick="salvarNaNuvem()">Finalizar e Confirmar</button>
        </div>
    </form>

    <div style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Últimos Registros (Nuvem)</h3>
            <button onclick="carregarHistorico()" style="width: auto; padding: 5px 15px; font-size: 12px;">Atualizar Lista</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="tabelaHistorico">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>SKU</th>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Lote</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5">Carregando dados...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

    // FUNÇÃO BUSCA AUTOMÁTICA (INSTANTÂNEA)
    document.getElementById('sku').addEventListener('input', function() {
        const skuDigitado = this.value.trim();
        const campoNome = document.getElementById('produtoNome');

        if (listaProdutos[skuDigitado]) {
            campoNome.value = listaProdutos[skuDigitado];
        } else {
            campoNome.value = ""; // Limpa se não achar ou estiver digitando
        }
    });

    // AVISO CASO NÃO EXISTA (SÓ QUANDO SAIR DO CAMPO)
    document.getElementById('sku').addEventListener('blur', function() {
        const skuDigitado = this.value.trim();
        if (skuDigitado !== "" && !listaProdutos[skuDigitado]) {
            alert("AVISO: Este SKU não está na lista automática. Digite o nome manualmente.");
        }
    });

    // FUNÇÃO SALVAR
    async function salvarNaNuvem() {
        const btn = document.getElementById('btnSalvar');
        const loading = document.getElementById('loading');
        
        if(document.getElementById('qtd').value !== document.getElementById('qtdConfirma').value) {
            alert("As quantidades não conferem!");
            return;
        }

        const registro = {
            data: new Date().toLocaleString('pt-BR'),
            sku: document.getElementById('sku').value,
            produto: document.getElementById('produtoNome').value,
            motivo: document.getElementById('motivo').value,
            qtd: document.getElementById('qtd').value,
            unidade: document.getElementById('unidade').value,
            lote: document.getElementById('lote').value,
            obs: document.getElementById('obs').value
        };

        btn.disabled = true;
        loading.style.display = "block";

        try {
            await fetch(URL_GOOGLE, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(registro)
            });
            
            alert("SALVO COM SUCESSO!");
            document.getElementById('perdaForm').reset();
            carregarHistorico();
        } catch (e) {
            alert("Erro ao salvar: " + e);
        } finally {
            btn.disabled = false;
            loading.style.display = "none";
        }
    }

    // FUNÇÃO CARREGAR HISTÓRICO
    async function carregarHistorico() {
        const tbody = document.querySelector('#tabelaHistorico tbody');
        try {
            const response = await fetch(URL_GOOGLE);
            const dados = await response.json();
            tbody.innerHTML = "";
            dados.slice(1).reverse().slice(0, 10).forEach(linha => {
                tbody.innerHTML += `<tr>
                    <td>${linha[0]}</td><td>${linha[1]}</td><td>${linha[2]}</td><td>${linha[4]}</td><td>${linha[6]}</td>
                </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = "<tr><td colspan='5'>Pronto para uso.</td></tr>";
        }
    }

    window.onload = carregarHistorico;
</script>

</body>
</html>
